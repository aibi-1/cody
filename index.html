<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Codify — чат-бот школы</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="chat-app">
    <div class="chat-header">
      <div class="avatar">C</div>
      <div class="header-text">
        <div class="name">Codify Bot</div>
        <div class="status">Онлайн</div>
      </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="loading-indicator" id="loading-indicator">
      <span></span><span></span><span></span>
    </div>

    <div class="quick-buttons" id="quick-buttons"></div>

    <form class="chat-form" id="chat-form">
      <input
        type="text"
        id="chat-input"
        placeholder="Напишите вопрос..."
        autocomplete="off"
      />
      <button type="submit" id="send-btn" aria-label="Отправить">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </form>
  </div>

  <script src="school-data.js"></script>
  <script src="prompts.js"></script>
  <script src="config.js"></script>
  <script src="ai.js"></script>
  <script src="app.js"></script>
</body>
</html>
